{% extends "base.html" %}

{% block content %}

<h2>Edit Patient</h2>

<form method="POST">

<div class="mb-3">

<label>Name</label>

<input
type="text"
name="name"
class="form-control"
value="{{ patient.name }}"
required>

</div>

<div class="mb-3">

<label>Age</label>

<input
type="number"
name="age"
class="form-control"
value="{{ patient.age }}"
required>

</div>

<div class="mb-3">

<label>Gender</label>

<select
name="gender"
class="form-control">

<option {% if patient.gender == 'Male' %}selected{% endif %}>Male</option>

<option {% if patient.gender == 'Female' %}selected{% endif %}>Female</option>

<option {% if patient.gender == 'Other' %}selected{% endif %}>Other</option>

</select>

</div>

<div class="mb-3">

<label>Phone</label>

<input
type="text"
name="phone"
class="form-control"
value="{{ patient.phone }}">

</div>

<div class="mb-3">

<label>Address</label>

<textarea
name="address"
class="form-control">{{ patient.address }}</textarea>

</div>

<button class="btn btn-primary">

Update Patient

</button>

</form>

{% endblock %}
