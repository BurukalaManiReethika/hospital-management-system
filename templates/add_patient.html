{% extends "base.html" %}

{% block content %}

<h2>Add Patient</h2>

<form method="POST">

<div class="mb-3">

<label>Name</label>

<input
type="text"
name="name"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Age</label>

<input
type="number"
name="age"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Gender</label>

<select
name="gender"
class="form-control">

<option>Male</option>

<option>Female</option>

<option>Other</option>

</select>

</div>

<div class="mb-3">

<label>Phone</label>

<input
type="text"
name="phone"
class="form-control">

</div>

<div class="mb-3">

<label>Address</label>

<textarea
name="address"
class="form-control"></textarea>

</div>

<button class="btn btn-primary">

Save Patient

</button>

</form>

{% endblock %}
