{% extends "base.html" %}

{% block content %}

<h2 class="mb-3">Add User</h2>

<form method="POST" class="col-md-6">

<div class="mb-3">
<label class="form-label">Username</label>
<input type="text" name="username" class="form-control" required autofocus>
</div>

<div class="mb-3">
<label class="form-label">Password</label>
<input type="password" name="password" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Role</label>
<select name="role" class="form-select">
{% for role in roles %}
<option value="{{ role }}" {% if role == 'receptionist' %}selected{% endif %}>{{ role | capitalize }}</option>
{% endfor %}
</select>
<div class="form-text">
Admin: full access. Doctor: patients, records, queue. Receptionist: patients, appointments, billing.
</div>
</div>

<button type="submit" class="btn btn-success">Create User</button>
<a href="{{ url_for('user_list') }}" class="btn btn-secondary">Cancel</a>

</form>

{% endblock %}
