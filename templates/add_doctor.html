{% extends "base.html" %}

{% block content %}

<h2>Add Doctor</h2>

<form method="POST">

<div class="mb-3">

<label>Name</label>

<input
type="text"
name="name"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Specialization</label>

<input
type="text"
name="specialization"
class="form-control"
required>

<label>Phone</label>

type="text"
name="phone"
class="form-control">

</div>

<button class="btn btn-primary">

Save Doctor

</button>

</form>

{% endblock %}
