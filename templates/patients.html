{% extends "base.html" %}

{% block content %}

<div class="d-flex justify-content-between mb-3">

<h2>Patients</h2>

<a href="/patients/add"
class="btn btn-success">

Add Patient

</a>

</div>

<table class="table table-striped">

<thead>

<tr>

<th>ID</th>

<th>Name</th>

<th>Age</th>

<th>Gender</th>

<th>Phone</th>

</tr>

</thead>

<tbody>

{% for patient in patients %}

<tr>

<td>{{ patient.id }}</td>

<td>{{ patient.name }}</td>

<td>{{ patient.age }}</td>

<td>{{ patient.gender }}</td>

<td>{{ patient.phone }}</td>

</tr>

{% endfor %}

</tbody>

</table>

{% endblock %}
