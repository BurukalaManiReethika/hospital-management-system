{% extends "base.html" %}

{% block content %}

<h2>Edit Doctor</h2>

<form method="POST">

<div class="mb-3">

<label>Name</label>

<input
type="text"
name="name"
class="form-control"
value="{{ doctor.name }}"
required>

</div>

<div class="mb-3">

<label>Specialization</label>

<input
type="text"
name="specialization"
class="form-control"
value="{{ doctor.specialization }}"
required>

</div>

<div class="mb-3">

<label>Phone</label>

<input
type="text"
name="phone"
class="form-control"
value="{{ doctor.phone }}">

</div>

<div class="mb-3">

<label>Avg. Consultation Time (minutes)</label>

<input
type="number"
name="avg_consult_minutes"
class="form-control"
value="{{ doctor.avg_consult_minutes or 15 }}"
min="1">

<small class="text-muted">Used to estimate patient wait times in the live queue.</small>

</div>

<button class="btn btn-primary">

Update Doctor

</button>

</form>

{% endblock %}
